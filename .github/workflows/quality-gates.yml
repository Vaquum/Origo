name: quality-gates

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  static-and-integrity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -e control-plane ruff pyright pytest

      - name: Ruff
        run: ruff check .

      - name: Pyright
        run: pyright

      - name: Integrity tests
        run: pytest -q tests
