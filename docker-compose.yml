services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./control-plane/clickhouse-config.xml:/etc/clickhouse-server/config.d/clickhouse-config.xml
    environment:
      CLICKHOUSE_USER: ${ORIGO_DOCKER_CLICKHOUSE_USER:?ORIGO_DOCKER_CLICKHOUSE_USER must be set}
      CLICKHOUSE_PASSWORD: ${ORIGO_DOCKER_CLICKHOUSE_PASSWORD:?ORIGO_DOCKER_CLICKHOUSE_PASSWORD must be set}
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:8123/ping']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    restart: unless-stopped

  dagster-webserver:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    image: origo/control-plane:local
    working_dir: /workspace/control-plane
    ports:
      - '${ORIGO_DOCKER_DAGSTER_PORT:?ORIGO_DOCKER_DAGSTER_PORT must be set}:3000'
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /workspace/control-plane
      PYTHONPATH: /workspace:/workspace/control-plane
      CLICKHOUSE_HOST: ${ORIGO_DOCKER_CLICKHOUSE_HOST:?ORIGO_DOCKER_CLICKHOUSE_HOST must be set}
      CLICKHOUSE_PORT: ${ORIGO_DOCKER_CLICKHOUSE_PORT:?ORIGO_DOCKER_CLICKHOUSE_PORT must be set}
      CLICKHOUSE_HTTP_PORT: ${ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT:?ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT must be set}
      CLICKHOUSE_USER: ${ORIGO_DOCKER_CLICKHOUSE_USER:?ORIGO_DOCKER_CLICKHOUSE_USER must be set}
      CLICKHOUSE_PASSWORD: ${ORIGO_DOCKER_CLICKHOUSE_PASSWORD:?ORIGO_DOCKER_CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_DATABASE: ${ORIGO_DOCKER_CLICKHOUSE_DATABASE:?ORIGO_DOCKER_CLICKHOUSE_DATABASE must be set}
      ORIGO_EXPORT_ROOT_DIR: ${ORIGO_DOCKER_EXPORT_ROOT_DIR:?ORIGO_DOCKER_EXPORT_ROOT_DIR must be set}
      ORIGO_ETF_DAILY_SCHEDULE_CRON: ${ORIGO_ETF_DAILY_SCHEDULE_CRON:?ORIGO_ETF_DAILY_SCHEDULE_CRON must be set}
      ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE: ${ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE:?ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE must be set}
      ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS: ${ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS:?ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS must be set}
      ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS: ${ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS:?ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS must be set}
      ORIGO_ETF_ANOMALY_LOG_PATH: ${ORIGO_DOCKER_ETF_ANOMALY_LOG_PATH:?ORIGO_DOCKER_ETF_ANOMALY_LOG_PATH must be set}
      ORIGO_ETF_DISCORD_WEBHOOK_URL: ${ORIGO_ETF_DISCORD_WEBHOOK_URL:?ORIGO_ETF_DISCORD_WEBHOOK_URL must be set}
      ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS: ${ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS:?ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS must be set}
      ORIGO_ETF_DISCORD_TIMEOUT_SECONDS: ${ORIGO_ETF_DISCORD_TIMEOUT_SECONDS:?ORIGO_ETF_DISCORD_TIMEOUT_SECONDS must be set}
    volumes:
      - dagster-instance:/opt/dagster-instance
      - origo-storage:/workspace/storage
    depends_on:
      clickhouse:
        condition: service_healthy
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w /workspace/control-plane/workspace.yaml
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://localhost:3000 >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

  dagster-daemon:
    build:
      context: .
      dockerfile: docker/Dockerfile.control-plane
    image: origo/control-plane:local
    working_dir: /workspace/control-plane
    env_file:
      - .env
    environment:
      DAGSTER_HOME: /workspace/control-plane
      PYTHONPATH: /workspace:/workspace/control-plane
      CLICKHOUSE_HOST: ${ORIGO_DOCKER_CLICKHOUSE_HOST:?ORIGO_DOCKER_CLICKHOUSE_HOST must be set}
      CLICKHOUSE_PORT: ${ORIGO_DOCKER_CLICKHOUSE_PORT:?ORIGO_DOCKER_CLICKHOUSE_PORT must be set}
      CLICKHOUSE_HTTP_PORT: ${ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT:?ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT must be set}
      CLICKHOUSE_USER: ${ORIGO_DOCKER_CLICKHOUSE_USER:?ORIGO_DOCKER_CLICKHOUSE_USER must be set}
      CLICKHOUSE_PASSWORD: ${ORIGO_DOCKER_CLICKHOUSE_PASSWORD:?ORIGO_DOCKER_CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_DATABASE: ${ORIGO_DOCKER_CLICKHOUSE_DATABASE:?ORIGO_DOCKER_CLICKHOUSE_DATABASE must be set}
      ORIGO_EXPORT_ROOT_DIR: ${ORIGO_DOCKER_EXPORT_ROOT_DIR:?ORIGO_DOCKER_EXPORT_ROOT_DIR must be set}
      ORIGO_ETF_DAILY_SCHEDULE_CRON: ${ORIGO_ETF_DAILY_SCHEDULE_CRON:?ORIGO_ETF_DAILY_SCHEDULE_CRON must be set}
      ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE: ${ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE:?ORIGO_ETF_DAILY_SCHEDULE_TIMEZONE must be set}
      ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS: ${ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS:?ORIGO_ETF_DAILY_RETRY_MAX_ATTEMPTS must be set}
      ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS: ${ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS:?ORIGO_ETF_DAILY_RETRY_SENSOR_MIN_INTERVAL_SECONDS must be set}
      ORIGO_ETF_ANOMALY_LOG_PATH: ${ORIGO_DOCKER_ETF_ANOMALY_LOG_PATH:?ORIGO_DOCKER_ETF_ANOMALY_LOG_PATH must be set}
      ORIGO_ETF_DISCORD_WEBHOOK_URL: ${ORIGO_ETF_DISCORD_WEBHOOK_URL:?ORIGO_ETF_DISCORD_WEBHOOK_URL must be set}
      ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS: ${ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS:?ORIGO_ETF_ALERT_SENSOR_MIN_INTERVAL_SECONDS must be set}
      ORIGO_ETF_DISCORD_TIMEOUT_SECONDS: ${ORIGO_ETF_DISCORD_TIMEOUT_SECONDS:?ORIGO_ETF_DISCORD_TIMEOUT_SECONDS must be set}
    volumes:
      - dagster-instance:/opt/dagster-instance
      - origo-storage:/workspace/storage
    depends_on:
      clickhouse:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    command: dagster-daemon run -w /workspace/control-plane/workspace.yaml
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: origo/api:local
    working_dir: /workspace
    env_file:
      - .env
    environment:
      PYTHONPATH: /workspace
      CLICKHOUSE_HOST: ${ORIGO_DOCKER_CLICKHOUSE_HOST:?ORIGO_DOCKER_CLICKHOUSE_HOST must be set}
      CLICKHOUSE_PORT: ${ORIGO_DOCKER_CLICKHOUSE_PORT:?ORIGO_DOCKER_CLICKHOUSE_PORT must be set}
      CLICKHOUSE_HTTP_PORT: ${ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT:?ORIGO_DOCKER_CLICKHOUSE_HTTP_PORT must be set}
      CLICKHOUSE_USER: ${ORIGO_DOCKER_CLICKHOUSE_USER:?ORIGO_DOCKER_CLICKHOUSE_USER must be set}
      CLICKHOUSE_PASSWORD: ${ORIGO_DOCKER_CLICKHOUSE_PASSWORD:?ORIGO_DOCKER_CLICKHOUSE_PASSWORD must be set}
      CLICKHOUSE_DATABASE: ${ORIGO_DOCKER_CLICKHOUSE_DATABASE:?ORIGO_DOCKER_CLICKHOUSE_DATABASE must be set}
      ORIGO_INTERNAL_API_KEY: ${ORIGO_INTERNAL_API_KEY:?ORIGO_INTERNAL_API_KEY must be set}
      ORIGO_QUERY_MAX_CONCURRENCY: ${ORIGO_QUERY_MAX_CONCURRENCY:?ORIGO_QUERY_MAX_CONCURRENCY must be set}
      ORIGO_QUERY_MAX_QUEUE: ${ORIGO_QUERY_MAX_QUEUE:?ORIGO_QUERY_MAX_QUEUE must be set}
      ORIGO_ALIGNED_QUERY_MAX_CONCURRENCY: ${ORIGO_ALIGNED_QUERY_MAX_CONCURRENCY:?ORIGO_ALIGNED_QUERY_MAX_CONCURRENCY must be set}
      ORIGO_ALIGNED_QUERY_MAX_QUEUE: ${ORIGO_ALIGNED_QUERY_MAX_QUEUE:?ORIGO_ALIGNED_QUERY_MAX_QUEUE must be set}
      ORIGO_ALIGNED_FRESHNESS_MAX_AGE_SECONDS: ${ORIGO_ALIGNED_FRESHNESS_MAX_AGE_SECONDS:?ORIGO_ALIGNED_FRESHNESS_MAX_AGE_SECONDS must be set}
      ORIGO_ETF_QUERY_SERVING_STATE: ${ORIGO_ETF_QUERY_SERVING_STATE:?ORIGO_ETF_QUERY_SERVING_STATE must be set}
      ORIGO_FRED_QUERY_SERVING_STATE: ${ORIGO_FRED_QUERY_SERVING_STATE:?ORIGO_FRED_QUERY_SERVING_STATE must be set}
      ORIGO_ETF_DAILY_STALE_MAX_AGE_DAYS: ${ORIGO_ETF_DAILY_STALE_MAX_AGE_DAYS:?ORIGO_ETF_DAILY_STALE_MAX_AGE_DAYS must be set}
      ORIGO_FRED_SOURCE_PUBLISH_STALE_MAX_AGE_DAYS: ${ORIGO_FRED_SOURCE_PUBLISH_STALE_MAX_AGE_DAYS:?ORIGO_FRED_SOURCE_PUBLISH_STALE_MAX_AGE_DAYS must be set}
      ORIGO_FRED_ALERT_AUDIT_LOG_PATH: ${ORIGO_FRED_ALERT_AUDIT_LOG_PATH:?ORIGO_FRED_ALERT_AUDIT_LOG_PATH must be set}
      ORIGO_FRED_DISCORD_WEBHOOK_URL: ${ORIGO_FRED_DISCORD_WEBHOOK_URL:?ORIGO_FRED_DISCORD_WEBHOOK_URL must be set}
      ORIGO_FRED_DISCORD_TIMEOUT_SECONDS: ${ORIGO_FRED_DISCORD_TIMEOUT_SECONDS:?ORIGO_FRED_DISCORD_TIMEOUT_SECONDS must be set}
      ORIGO_DAGSTER_GRAPHQL_URL: http://${ORIGO_DOCKER_DAGSTER_HOST:?ORIGO_DOCKER_DAGSTER_HOST must be set}:3000/graphql
      ORIGO_DAGSTER_REPOSITORY_NAME: ${ORIGO_DAGSTER_REPOSITORY_NAME:?ORIGO_DAGSTER_REPOSITORY_NAME must be set}
      ORIGO_DAGSTER_LOCATION_NAME: ${ORIGO_DAGSTER_LOCATION_NAME:?ORIGO_DAGSTER_LOCATION_NAME must be set}
      ORIGO_DAGSTER_EXPORT_JOB_NAME: ${ORIGO_DAGSTER_EXPORT_JOB_NAME:?ORIGO_DAGSTER_EXPORT_JOB_NAME must be set}
      ORIGO_EXPORT_ROOT_DIR: ${ORIGO_DOCKER_EXPORT_ROOT_DIR:?ORIGO_DOCKER_EXPORT_ROOT_DIR must be set}
      ORIGO_EXPORT_MAX_CONCURRENCY: ${ORIGO_EXPORT_MAX_CONCURRENCY:?ORIGO_EXPORT_MAX_CONCURRENCY must be set}
      ORIGO_EXPORT_MAX_QUEUE: ${ORIGO_EXPORT_MAX_QUEUE:?ORIGO_EXPORT_MAX_QUEUE must be set}
      ORIGO_SOURCE_RIGHTS_MATRIX_PATH: ${ORIGO_SOURCE_RIGHTS_MATRIX_PATH:?ORIGO_SOURCE_RIGHTS_MATRIX_PATH must be set}
      ORIGO_EXPORT_AUDIT_LOG_PATH: ${ORIGO_EXPORT_AUDIT_LOG_PATH:?ORIGO_EXPORT_AUDIT_LOG_PATH must be set}
    ports:
      - '${ORIGO_DOCKER_API_PORT:?ORIGO_DOCKER_API_PORT must be set}:8000'
    volumes:
      - origo-storage:/workspace/storage
    depends_on:
      clickhouse:
        condition: service_healthy
      dagster-webserver:
        condition: service_healthy
    command: uvicorn api.origo_api.main:app --host 0.0.0.0 --port 8000
    healthcheck:
      test: ['CMD-SHELL', 'curl --fail --silent http://localhost:8000/health >/dev/null || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s
    restart: unless-stopped

volumes:
  clickhouse-data:
  dagster-instance:
  origo-storage:
