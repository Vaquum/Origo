name: integrity-gate

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  integrity-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . -e control-plane pytest

      - name: Run integrity gate
        run: PYTHONPATH=.:control-plane pytest -q tests/integrity
