name: deploy-on-merge

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-on-merge
  cancel-in-progress: true

jobs:
  deploy-on-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image tags
        id: images
        run: |
          set -euo pipefail
          owner_lower="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          echo "api_image=ghcr.io/${owner_lower}/origo-api:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "control_plane_image=ghcr.io/${owner_lower}/origo-control-plane:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: ${{ steps.images.outputs.api_image }}

      - name: Build and push control-plane image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.control-plane
          push: true
          tags: ${{ steps.images.outputs.control_plane_image }}

      - name: Install SSH tooling on runner
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends sshpass

      - name: Prepare SSH known_hosts
        env:
          ORIGO_SERVER_KNOWN_HOSTS: ${{ secrets.ORIGO_SERVER_KNOWN_HOSTS }}
        run: |
          set -euo pipefail

          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "ERROR: ${name} must be set and non-empty." >&2
              exit 1
            fi
          }

          require_env ORIGO_SERVER_KNOWN_HOSTS
          install -m 0700 -d "${HOME}/.ssh"
          printf '%s\n' "${ORIGO_SERVER_KNOWN_HOSTS}" > "${HOME}/.ssh/known_hosts"
          chmod 0600 "${HOME}/.ssh/known_hosts"

      - name: Bootstrap host and deploy images
        env:
          ORIGO_SERVER_IP: ${{ secrets.ORIGO_SERVER_IP }}
          ORIGO_SERVER_USER: ${{ secrets.ORIGO_SERVER_USER }}
          ORIGO_SERVER_PASSWORD: ${{ secrets.ORIGO_SERVER_PASSWORD }}
          ORIGO_SERVER_ENV_B64: ${{ secrets.ORIGO_SERVER_ENV_B64 }}
          ORIGO_DEPLOY_API_PORT: '80'
          ORIGO_API_IMAGE: ${{ steps.images.outputs.api_image }}
          ORIGO_CONTROL_PLANE_IMAGE: ${{ steps.images.outputs.control_plane_image }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "ERROR: ${name} must be set and non-empty." >&2
              exit 1
            fi
          }

          require_env ORIGO_SERVER_IP
          require_env ORIGO_SERVER_USER
          require_env ORIGO_SERVER_PASSWORD
          require_env ORIGO_DEPLOY_API_PORT
          require_env ORIGO_API_IMAGE
          require_env ORIGO_CONTROL_PLANE_IMAGE
          require_env GHCR_USER
          require_env GHCR_TOKEN

          export SSHPASS="${ORIGO_SERVER_PASSWORD}"
          ssh_known_hosts_path="${HOME}/.ssh/known_hosts"
          if [[ ! -s "${ssh_known_hosts_path}" ]]; then
            echo "ERROR: SSH known_hosts file missing at ${ssh_known_hosts_path}." >&2
            exit 1
          fi
          ssh_opts=(-o StrictHostKeyChecking=yes -o UserKnownHostsFile="${ssh_known_hosts_path}")
          remote="${ORIGO_SERVER_USER}@${ORIGO_SERVER_IP}"

          origo_server_password_b64="$(printf '%s' "${ORIGO_SERVER_PASSWORD}" | base64 -w0)"
          origo_server_env_b64_b64="$(printf '%s' "${ORIGO_SERVER_ENV_B64}" | base64 -w0)"
          origo_deploy_api_port_b64="$(printf '%s' "${ORIGO_DEPLOY_API_PORT}" | base64 -w0)"
          origo_api_image_b64="$(printf '%s' "${ORIGO_API_IMAGE}" | base64 -w0)"
          origo_control_plane_image_b64="$(printf '%s' "${ORIGO_CONTROL_PLANE_IMAGE}" | base64 -w0)"
          origo_deploy_compose_b64="$(base64 -w0 deploy/docker-compose.server.yml)"
          origo_clickhouse_config_b64="$(base64 -w0 control-plane/clickhouse-config.xml)"
          ghcr_user_b64="$(printf '%s' "${GHCR_USER}" | base64 -w0)"
          ghcr_token_b64="$(printf '%s' "${GHCR_TOKEN}" | base64 -w0)"

          sshpass -e ssh "${ssh_opts[@]}" "${remote}" \
            "ORIGO_SERVER_PASSWORD_B64='${origo_server_password_b64}' \
             ORIGO_SERVER_ENV_B64_B64='${origo_server_env_b64_b64}' \
             ORIGO_DEPLOY_API_PORT_B64='${origo_deploy_api_port_b64}' \
             ORIGO_API_IMAGE_B64='${origo_api_image_b64}' \
             ORIGO_CONTROL_PLANE_IMAGE_B64='${origo_control_plane_image_b64}' \
             ORIGO_DEPLOY_COMPOSE_B64='${origo_deploy_compose_b64}' \
             ORIGO_CLICKHOUSE_CONFIG_B64='${origo_clickhouse_config_b64}' \
             GHCR_USER_B64='${ghcr_user_b64}' \
             GHCR_TOKEN_B64='${ghcr_token_b64}' \
             bash -s" <<'REMOTE_SCRIPT'
          set -euo pipefail

          decode_env_b64_required() {
            local encoded_name="$1"
            local target_name="$2"
            local encoded_value="${!encoded_name:-}"
            if [[ -z "${encoded_value}" ]]; then
              echo "ERROR: ${encoded_name} must be set and non-empty." >&2
              exit 1
            fi
            local decoded_value
            decoded_value="$(printf '%s' "${encoded_value}" | base64 --decode)"
            export "${target_name}=${decoded_value}"
          }

          decode_env_b64_required ORIGO_SERVER_PASSWORD_B64 ORIGO_SERVER_PASSWORD
          decode_env_b64_required ORIGO_DEPLOY_API_PORT_B64 ORIGO_DEPLOY_API_PORT
          decode_env_b64_required ORIGO_API_IMAGE_B64 ORIGO_API_IMAGE
          decode_env_b64_required ORIGO_CONTROL_PLANE_IMAGE_B64 ORIGO_CONTROL_PLANE_IMAGE
          decode_env_b64_required ORIGO_DEPLOY_COMPOSE_B64 ORIGO_DEPLOY_COMPOSE_CONTENT
          decode_env_b64_required ORIGO_CLICKHOUSE_CONFIG_B64 ORIGO_CLICKHOUSE_CONFIG_CONTENT
          decode_env_b64_required GHCR_USER_B64 GHCR_USER
          decode_env_b64_required GHCR_TOKEN_B64 GHCR_TOKEN
          if [[ -n "${ORIGO_SERVER_ENV_B64_B64:-}" ]]; then
            export ORIGO_SERVER_ENV_B64="$(printf '%s' "${ORIGO_SERVER_ENV_B64_B64}" | base64 --decode)"
          else
            export ORIGO_SERVER_ENV_B64=''
          fi

          require_env() {
            local name="$1"
            if [[ -z "${!name:-}" ]]; then
              echo "ERROR: ${name} must be set and non-empty." >&2
              exit 1
            fi
          }

          require_env ORIGO_SERVER_PASSWORD
          require_env ORIGO_DEPLOY_API_PORT
          require_env ORIGO_API_IMAGE
          require_env ORIGO_CONTROL_PLANE_IMAGE
          require_env ORIGO_DEPLOY_COMPOSE_CONTENT
          require_env ORIGO_CLICKHOUSE_CONFIG_CONTENT
          require_env GHCR_USER
          require_env GHCR_TOKEN

          if [[ ! "${ORIGO_DEPLOY_API_PORT}" =~ ^[0-9]+$ ]]; then
            echo "ERROR: ORIGO_DEPLOY_API_PORT must be an integer in range 1..65535." >&2
            exit 1
          fi
          if [[ "${ORIGO_DEPLOY_API_PORT}" -lt 1 || "${ORIGO_DEPLOY_API_PORT}" -gt 65535 ]]; then
            echo "ERROR: ORIGO_DEPLOY_API_PORT must be in range 1..65535." >&2
            exit 1
          fi

          if [[ "$(id -u)" -ne 0 ]]; then
            if ! command -v sudo >/dev/null 2>&1; then
              echo "ERROR: sudo is required for non-root deployments." >&2
              exit 1
            fi
            printf '%s\n' "${ORIGO_SERVER_PASSWORD}" | sudo -S -v
          fi

          run_privileged() {
            if [[ "$(id -u)" -eq 0 ]]; then
              "$@"
            else
              sudo -n "$@"
            fi
          }

          refresh_sudo_ticket() {
            if [[ "$(id -u)" -eq 0 ]]; then
              return 0
            fi
            printf '%s\n' "${ORIGO_SERVER_PASSWORD}" | sudo -S -v
          }

          tmp_env=''
          tmp_env_next=''
          cleanup_tmp_files() {
            if [[ -n "${tmp_env}" ]]; then
              rm -f -- "${tmp_env}"
            fi
            if [[ -n "${tmp_env_next}" ]]; then
              rm -f -- "${tmp_env_next}"
            fi
          }
          trap cleanup_tmp_files EXIT

          run_privileged mkdir -p /opt/origo/deploy /opt/origo/config

          if [[ ! -f /opt/origo/deploy/.env ]]; then
            if [[ -z "${ORIGO_SERVER_ENV_B64:-}" ]]; then
              echo "ERROR: first-run bootstrap requires ORIGO_SERVER_ENV_B64 because /opt/origo/deploy/.env is missing." >&2
              exit 1
            fi
            tmp_env="$(mktemp)"
            printf '%s' "${ORIGO_SERVER_ENV_B64}" | base64 --decode > "${tmp_env}"
            if [[ ! -s "${tmp_env}" ]]; then
              rm -f "${tmp_env}"
              echo "ERROR: decoded ORIGO_SERVER_ENV_B64 produced an empty env file." >&2
              exit 1
            fi
            run_privileged mv "${tmp_env}" /opt/origo/deploy/.env
            run_privileged chmod 0600 /opt/origo/deploy/.env
            tmp_env=''
          fi

          if [[ ! -s /opt/origo/deploy/.env ]]; then
            echo "ERROR: /opt/origo/deploy/.env must be present and non-empty." >&2
            exit 1
          fi

          printf '%s' "${ORIGO_DEPLOY_COMPOSE_CONTENT}" \
            | run_privileged tee /opt/origo/deploy/docker-compose.yml >/dev/null
          printf '%s' "${ORIGO_CLICKHOUSE_CONFIG_CONTENT}" \
            | run_privileged tee /opt/origo/config/clickhouse-config.xml >/dev/null
          run_privileged chmod 0644 \
            /opt/origo/deploy/docker-compose.yml \
            /opt/origo/config/clickhouse-config.xml

          compose_cmd() {
            run_privileged docker compose \
              -f /opt/origo/deploy/docker-compose.yml \
              --env-file /opt/origo/deploy/.env \
              "$@"
          }

          if ! command -v docker >/dev/null 2>&1; then
            run_privileged apt-get update
            run_privileged apt-get install -y ca-certificates curl gnupg lsb-release
            run_privileged install -m 0755 -d /etc/apt/keyrings
            distro_id="$(. /etc/os-release && echo "${ID}")"
            if [[ "${distro_id}" != "ubuntu" && "${distro_id}" != "debian" ]]; then
              echo "ERROR: unsupported distro for automated Docker bootstrap: ${distro_id}" >&2
              exit 1
            fi
            distro_codename="$(. /etc/os-release && echo "${VERSION_CODENAME:-${UBUNTU_CODENAME:-}}")"
            if [[ -z "${distro_codename}" ]]; then
              echo "ERROR: could not resolve distro codename for Docker apt repository." >&2
              exit 1
            fi

            if [[ ! -f /etc/apt/keyrings/docker.gpg ]]; then
              curl -fsSL "https://download.docker.com/linux/${distro_id}/gpg" \
                | run_privileged gpg --dearmor -o /etc/apt/keyrings/docker.gpg
              run_privileged chmod a+r /etc/apt/keyrings/docker.gpg
            fi
            distro_arch="$(dpkg --print-architecture)"
            printf 'deb [arch=%s signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/%s %s stable\n' \
              "${distro_arch}" "${distro_id}" "${distro_codename}" \
              | run_privileged tee /etc/apt/sources.list.d/docker.list >/dev/null
            run_privileged apt-get update
            run_privileged apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          fi

          if ! run_privileged docker compose version >/dev/null 2>&1; then
            run_privileged apt-get update
            run_privileged apt-get install -y docker-compose-plugin
          fi

          if ! run_privileged docker info >/dev/null 2>&1; then
            if command -v systemctl >/dev/null 2>&1; then
              run_privileged systemctl enable --now docker
            else
              run_privileged service docker start
            fi
          fi
          run_privileged docker info >/dev/null

          if ! command -v parted >/dev/null 2>&1 || ! command -v mkfs.ext4 >/dev/null 2>&1 || ! command -v blkid >/dev/null 2>&1; then
            run_privileged apt-get update
            run_privileged apt-get install -y parted e2fsprogs util-linux
          fi

          refresh_sudo_ticket

          read_env_value() {
            local key="$1"
            run_privileged awk -F= -v key="${key}" '
              $1 == key {
                sub(/^[^=]*=/, "", $0)
                print $0
                exit
              }
            ' /opt/origo/deploy/.env
          }

          bitcoin_core_rpc_url="$(read_env_value ORIGO_BITCOIN_CORE_RPC_URL || true)"
          if [[ -z "${bitcoin_core_rpc_url}" ]]; then
            bitcoin_core_rpc_url='http://bitcoin-core:8332'
          fi

          bitcoin_core_rpc_user="$(read_env_value ORIGO_BITCOIN_CORE_RPC_USER || true)"
          if [[ -z "${bitcoin_core_rpc_user}" ]]; then
            bitcoin_core_rpc_user='origo-bitcoin-rpc'
          fi

          bitcoin_core_rpc_password="$(read_env_value ORIGO_BITCOIN_CORE_RPC_PASSWORD || true)"
          if [[ -z "${bitcoin_core_rpc_password}" ]]; then
            if ! command -v openssl >/dev/null 2>&1; then
              echo "ERROR: openssl is required to generate ORIGO_BITCOIN_CORE_RPC_PASSWORD." >&2
              exit 1
            fi
            bitcoin_core_rpc_password="$(openssl rand -hex 32)"
          fi

          bitcoin_core_network="$(read_env_value ORIGO_BITCOIN_CORE_NETWORK || true)"
          if [[ -z "${bitcoin_core_network}" ]]; then
            bitcoin_core_network='main'
          fi

          bitcoin_core_rpc_timeout_seconds="$(read_env_value ORIGO_BITCOIN_CORE_RPC_TIMEOUT_SECONDS || true)"
          if [[ -z "${bitcoin_core_rpc_timeout_seconds}" ]]; then
            bitcoin_core_rpc_timeout_seconds='30'
          fi

          bitcoin_core_headers_start_height="$(read_env_value ORIGO_BITCOIN_CORE_HEADERS_START_HEIGHT || true)"
          if [[ -z "${bitcoin_core_headers_start_height}" ]]; then
            bitcoin_core_headers_start_height='0'
          fi

          bitcoin_core_headers_end_height="$(read_env_value ORIGO_BITCOIN_CORE_HEADERS_END_HEIGHT || true)"
          if [[ -z "${bitcoin_core_headers_end_height}" ]]; then
            bitcoin_core_headers_end_height='100'
          fi

          bitcoin_core_data_dir="$(read_env_value ORIGO_BITCOIN_CORE_DATA_DIR || true)"
          if [[ -z "${bitcoin_core_data_dir}" ]]; then
            bitcoin_core_data_dir='/mnt/origo-bitcoin-core-data'
          fi

          bitcoin_core_data_disk_by_id="$(read_env_value ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID || true)"

          tmp_env_next="$(mktemp)"
          run_privileged awk '
            $0 !~ /^ORIGO_API_IMAGE=/ &&
            $0 !~ /^ORIGO_CONTROL_PLANE_IMAGE=/ &&
            $0 !~ /^ORIGO_DOCKER_API_PORT=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_RPC_URL=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_RPC_USER=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_RPC_PASSWORD=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_NETWORK=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_RPC_TIMEOUT_SECONDS=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_HEADERS_START_HEIGHT=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_HEADERS_END_HEIGHT=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_DATA_DIR=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=/
          ' /opt/origo/deploy/.env > "${tmp_env_next}"
          {
            cat "${tmp_env_next}"
            echo "ORIGO_API_IMAGE=${ORIGO_API_IMAGE}"
            echo "ORIGO_CONTROL_PLANE_IMAGE=${ORIGO_CONTROL_PLANE_IMAGE}"
            echo "ORIGO_DOCKER_API_PORT=${ORIGO_DEPLOY_API_PORT}"
            echo "ORIGO_BITCOIN_CORE_RPC_URL=${bitcoin_core_rpc_url}"
            echo "ORIGO_BITCOIN_CORE_RPC_USER=${bitcoin_core_rpc_user}"
            echo "ORIGO_BITCOIN_CORE_RPC_PASSWORD=${bitcoin_core_rpc_password}"
            echo "ORIGO_BITCOIN_CORE_NETWORK=${bitcoin_core_network}"
            echo "ORIGO_BITCOIN_CORE_RPC_TIMEOUT_SECONDS=${bitcoin_core_rpc_timeout_seconds}"
            echo "ORIGO_BITCOIN_CORE_HEADERS_START_HEIGHT=${bitcoin_core_headers_start_height}"
            echo "ORIGO_BITCOIN_CORE_HEADERS_END_HEIGHT=${bitcoin_core_headers_end_height}"
            echo "ORIGO_BITCOIN_CORE_DATA_DIR=${bitcoin_core_data_dir}"
            echo "ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=${bitcoin_core_data_disk_by_id}"
          } | run_privileged tee /opt/origo/deploy/.env >/dev/null
          rm -f -- "${tmp_env_next}"
          tmp_env_next=''
          run_privileged chmod 0600 /opt/origo/deploy/.env

          echo "Deploy target images:"
          echo "  ORIGO_API_IMAGE=${ORIGO_API_IMAGE}"
          echo "  ORIGO_CONTROL_PLANE_IMAGE=${ORIGO_CONTROL_PLANE_IMAGE}"
          echo "  ORIGO_DOCKER_API_PORT=${ORIGO_DEPLOY_API_PORT}"
          echo "  ORIGO_BITCOIN_CORE_RPC_URL=${bitcoin_core_rpc_url}"
          echo "  ORIGO_BITCOIN_CORE_NETWORK=${bitcoin_core_network}"
          echo "  ORIGO_BITCOIN_CORE_HEADERS_START_HEIGHT=${bitcoin_core_headers_start_height}"
          echo "  ORIGO_BITCOIN_CORE_HEADERS_END_HEIGHT=${bitcoin_core_headers_end_height}"
          echo "  ORIGO_BITCOIN_CORE_DATA_DIR=${bitcoin_core_data_dir}"
          if [[ -n "${bitcoin_core_data_disk_by_id}" ]]; then
            echo "  ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=${bitcoin_core_data_disk_by_id}"
          else
            echo "  ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=<auto-detect>"
          fi

          detect_bitcoin_core_data_disk_by_id() {
            local link_name
            local link_path
            local disk_path
            local disk_type
            local disk_size
            local max_free_gib
            while IFS= read -r link_name; do
              [[ "${link_name}" == *-part* ]] && continue
              link_path="/dev/disk/by-id/${link_name}"
              [[ -L "${link_path}" ]] || continue
              disk_path="$(readlink -f "${link_path}")"
              [[ -b "${disk_path}" ]] || continue
              read -r disk_type disk_size < <(run_privileged lsblk -dnbo TYPE,SIZE "${disk_path}")
              [[ "${disk_type}" == "disk" ]] || continue
              [[ "${disk_size}" -ge 3000000000000 ]] || continue
              max_free_gib="$(run_privileged parted -m "${disk_path}" unit GiB print free | awk -F: '
                $5 ~ /^free/ {
                  gsub("GiB", "", $4)
                  if (($4 + 0) > max) {
                    max = $4 + 0
                  }
                }
                END {
                  if (max == "") {
                    max = 0
                  }
                  printf "%.0f", max
                }
              ')"
              if [[ "${max_free_gib}" -ge 500 ]]; then
                printf '%s' "${link_path}"
                return 0
              fi
            done < <(ls -1 /dev/disk/by-id | sort)
            return 1
          }

          ensure_bitcoin_core_data_mount() {
            local target_dir="${bitcoin_core_data_dir}"
            if [[ -z "${target_dir}" ]]; then
              echo "ERROR: ORIGO_BITCOIN_CORE_DATA_DIR must be set." >&2
              exit 1
            fi
            if [[ "${target_dir}" != /* ]]; then
              echo "ERROR: ORIGO_BITCOIN_CORE_DATA_DIR must be an absolute path: ${target_dir}" >&2
              exit 1
            fi

            local disk_by_id="${bitcoin_core_data_disk_by_id}"
            if [[ -z "${disk_by_id}" ]]; then
              disk_by_id="$(detect_bitcoin_core_data_disk_by_id || true)"
              if [[ -z "${disk_by_id}" ]]; then
                echo "ERROR: no >=3TB disk with >=500GiB free space found for Bitcoin Core data mount." >&2
                exit 1
              fi
              bitcoin_core_data_disk_by_id="${disk_by_id}"
            fi

            if [[ ! -L "${disk_by_id}" ]]; then
              echo "ERROR: ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID must be a valid /dev/disk/by-id symlink: ${disk_by_id}" >&2
              exit 1
            fi

            local disk_path
            disk_path="$(readlink -f "${disk_by_id}")"
            if [[ ! -b "${disk_path}" ]]; then
              echo "ERROR: resolved disk path is not a block device: ${disk_path}" >&2
              exit 1
            fi

            local partition_device=''
            local mounted_source=''
            if run_privileged mountpoint -q "${target_dir}"; then
              mounted_source="$(run_privileged findmnt -n -o SOURCE --target "${target_dir}")"
              if [[ -n "${mounted_source}" && -b "${mounted_source}" ]]; then
                local parent_kname
                parent_kname="$(run_privileged lsblk -nro PKNAME "${mounted_source}" | head -n 1 || true)"
                if [[ -n "${parent_kname}" && "/dev/${parent_kname}" == "${disk_path}" ]]; then
                  partition_device="${mounted_source}"
                fi
              fi
            fi

            if [[ -z "${partition_device}" ]]; then
              partition_device="$(run_privileged lsblk -npo NAME,LABEL "${disk_path}" | awk '$2 == "origo-bitcoin-core" { print $1; exit }')"
            fi

            if [[ -z "${partition_device}" ]]; then
              local free_start_gib
              free_start_gib="$(run_privileged parted -m "${disk_path}" unit GiB print free | awk -F: '
                $5 ~ /^free/ {
                  gsub("GiB", "", $2)
                  gsub("GiB", "", $4)
                  if (($4 + 0) > max) {
                    max = $4 + 0
                    start = $2 + 0
                  }
                }
                END {
                  if (max < 500) {
                    exit 1
                  }
                  printf "%.0f", start
                }
              ')"
              if [[ -z "${free_start_gib}" ]]; then
                echo "ERROR: could not resolve free partition start for ${disk_path}." >&2
                exit 1
              fi

              local before_parts
              local after_parts
              local new_partition_device
              before_parts="$(run_privileged lsblk -npo NAME "${disk_path}" | tail -n +2 | sed '/^$/d' | sort)"
              run_privileged parted -s "${disk_path}" mkpart primary ext4 "${free_start_gib}GiB" 100%
              run_privileged partprobe "${disk_path}"
              sleep 1
              after_parts="$(run_privileged lsblk -npo NAME "${disk_path}" | tail -n +2 | sed '/^$/d' | sort)"
              new_partition_device="$(comm -13 <(printf '%s\n' "${before_parts}") <(printf '%s\n' "${after_parts}") | head -n 1)"
              if [[ -z "${new_partition_device}" ]]; then
                echo "ERROR: failed to detect newly created partition on ${disk_path}." >&2
                exit 1
              fi
              partition_device="${new_partition_device}"
            fi

            local partition_attempt=1
            while [[ "${partition_attempt}" -le 20 ]]; do
              if [[ -b "${partition_device}" ]]; then
                break
              fi
              sleep 1
              partition_attempt=$((partition_attempt + 1))
            done
            if [[ ! -b "${partition_device}" ]]; then
              echo "ERROR: expected partition device not present after provisioning: ${partition_device}" >&2
              exit 1
            fi

            local partition_type
            partition_type="$(run_privileged blkid -s TYPE -o value "${partition_device}" || true)"
            if [[ -z "${partition_type}" ]]; then
              run_privileged mkfs.ext4 -F -L origo-bitcoin-core "${partition_device}"
            elif [[ "${partition_type}" != "ext4" ]]; then
              echo "ERROR: expected ext4 filesystem on ${partition_device}, found ${partition_type}." >&2
              exit 1
            fi

            local partition_uuid
            partition_uuid="$(run_privileged blkid -s UUID -o value "${partition_device}")"
            if [[ -z "${partition_uuid}" ]]; then
              echo "ERROR: failed to resolve UUID for ${partition_device}." >&2
              exit 1
            fi

            run_privileged install -d -m 0755 "${target_dir}"

            local fstab_tmp
            fstab_tmp="$(mktemp)"
            run_privileged awk -v mountpoint="${target_dir}" '$2 != mountpoint { print }' /etc/fstab > "${fstab_tmp}"
            printf 'UUID=%s %s ext4 defaults,nofail 0 2\n' "${partition_uuid}" "${target_dir}" >> "${fstab_tmp}"
            run_privileged cp "${fstab_tmp}" /etc/fstab
            rm -f -- "${fstab_tmp}"

            local resolved_partition_device
            resolved_partition_device="$(readlink -f "${partition_device}")"
            if run_privileged mountpoint -q "${target_dir}"; then
              mounted_source="$(run_privileged findmnt -n -o SOURCE --target "${target_dir}")"
              local resolved_mounted_source
              resolved_mounted_source="$(readlink -f "${mounted_source}" || printf '%s' "${mounted_source}")"
              if [[ "${resolved_mounted_source}" != "${resolved_partition_device}" ]]; then
                run_privileged umount "${target_dir}"
              fi
            fi

            if ! run_privileged mountpoint -q "${target_dir}"; then
              run_privileged mount "${target_dir}"
            fi

            mounted_source="$(run_privileged findmnt -n -o SOURCE --target "${target_dir}")"
            echo "Bitcoin Core data mount ready: target=${target_dir} source=${mounted_source} disk=${disk_by_id}"
          }

          ensure_bitcoin_core_data_mount

          tmp_env_next="$(mktemp)"
          run_privileged awk '
            $0 !~ /^ORIGO_BITCOIN_CORE_DATA_DIR=/ &&
            $0 !~ /^ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=/
          ' /opt/origo/deploy/.env > "${tmp_env_next}"
          {
            cat "${tmp_env_next}"
            echo "ORIGO_BITCOIN_CORE_DATA_DIR=${bitcoin_core_data_dir}"
            echo "ORIGO_BITCOIN_CORE_DATA_DISK_BY_ID=${bitcoin_core_data_disk_by_id}"
          } | run_privileged tee /opt/origo/deploy/.env >/dev/null
          rm -f -- "${tmp_env_next}"
          tmp_env_next=''
          run_privileged chmod 0600 /opt/origo/deploy/.env

          printf '%s' "${GHCR_TOKEN}" | run_privileged docker login ghcr.io -u "${GHCR_USER}" --password-stdin

          echo "Pulling compose service images."
          compose_cmd pull
          echo "Starting ClickHouse and Bitcoin Core before migrations."
          compose_cmd up -d clickhouse bitcoin-core

          clickhouse_container_id="$(compose_cmd ps -q clickhouse)"
          if [[ -z "${clickhouse_container_id}" ]]; then
            echo "ERROR: clickhouse container id missing after compose up." >&2
            exit 1
          fi

          health_attempt=1
          while [[ "${health_attempt}" -le 90 ]]; do
            health_status="$(run_privileged docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${clickhouse_container_id}")"
            if [[ "${health_status}" == "healthy" || "${health_status}" == "running" ]]; then
              break
            fi
            sleep 2
            health_attempt=$((health_attempt + 1))
          done

          final_health_status="$(run_privileged docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "${clickhouse_container_id}")"
          if [[ "${final_health_status}" != "healthy" && "${final_health_status}" != "running" ]]; then
            echo "ERROR: clickhouse failed health wait, status=${final_health_status}" >&2
            compose_cmd logs --no-color clickhouse >&2
            exit 1
          fi

          echo "Running ClickHouse SQL migrations."
          refresh_sudo_ticket
          compose_cmd run --rm -T dagster-webserver python -m origo_control_plane.migrations.cli migrate </dev/null
          echo "Migrations completed."

          echo "Applying ClickHouse and Bitcoin Core update without forced recreation."
          compose_cmd up -d --remove-orphans clickhouse bitcoin-core

          echo "Applying runtime stack update with forced recreation for application services."
          compose_cmd up -d --remove-orphans --force-recreate dagster-webserver dagster-daemon api

          require_container_for_service() {
            local service="$1"
            local container_id
            container_id="$(compose_cmd ps -q "${service}")"
            if [[ -z "${container_id}" ]]; then
              echo "ERROR: service ${service} has no container id after compose up." >&2
              compose_cmd ps -a >&2 || true
              exit 1
            fi
            printf '%s' "${container_id}"
          }

          container_image_ref() {
            local container_id="$1"
            run_privileged docker inspect --format '{{.Config.Image}}' "${container_id}"
          }

          assert_service_image() {
            local service="$1"
            local container_id="$2"
            local expected_image="$3"
            local actual_image
            actual_image="$(container_image_ref "${container_id}")"
            if [[ "${actual_image}" != "${expected_image}" ]]; then
              echo "ERROR: service ${service} image mismatch: expected=${expected_image} actual=${actual_image}" >&2
              compose_cmd ps >&2 || true
              compose_cmd logs --no-color "${service}" >&2 || true
              exit 1
            fi
            echo "Verified service ${service} image=${actual_image}"
          }

          container_runtime_status() {
            local container_id="$1"
            run_privileged docker inspect \
              --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' \
              "${container_id}"
          }

          wait_for_service_state() {
            local service="$1"
            local container_id="$2"
            local expected="$3"
            local attempt=1
            local status=''
            while [[ "${attempt}" -le 90 ]]; do
              status="$(container_runtime_status "${container_id}")"
              if [[ "${status}" == "exited" || "${status}" == "dead" ]]; then
                echo "ERROR: service ${service} entered terminal state ${status}" >&2
                compose_cmd logs --no-color "${service}" >&2 || true
                exit 1
              fi
              if [[ "${status}" == "${expected}" ]]; then
                return 0
              fi
              sleep 2
              attempt=$((attempt + 1))
            done
            echo "ERROR: service ${service} did not reach expected state ${expected}; final=${status}" >&2
            compose_cmd logs --no-color "${service}" >&2 || true
            exit 1
          }

          clickhouse_container_id="$(require_container_for_service clickhouse)"
          bitcoin_core_container_id="$(require_container_for_service bitcoin-core)"
          dagster_webserver_container_id="$(require_container_for_service dagster-webserver)"
          dagster_daemon_container_id="$(require_container_for_service dagster-daemon)"
          api_container_id="$(require_container_for_service api)"

          wait_for_service_state clickhouse "${clickhouse_container_id}" healthy
          wait_for_service_state bitcoin-core "${bitcoin_core_container_id}" healthy
          wait_for_service_state dagster-webserver "${dagster_webserver_container_id}" healthy
          wait_for_service_state dagster-daemon "${dagster_daemon_container_id}" running
          wait_for_service_state api "${api_container_id}" healthy

          assert_service_image api "${api_container_id}" "${ORIGO_API_IMAGE}"
          assert_service_image dagster-webserver "${dagster_webserver_container_id}" "${ORIGO_CONTROL_PLANE_IMAGE}"
          assert_service_image dagster-daemon "${dagster_daemon_container_id}" "${ORIGO_CONTROL_PLANE_IMAGE}"

          compose_cmd ps
          REMOTE_SCRIPT
