services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/clickhouse-config.xml
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  dagit:
    build: .
    image: origo-control-plane-dagster:latest
    ports:
      - "4000:3000"
    environment:
      - DAGSTER_HOME=/opt/app
      - PYTHONPATH=/opt/app
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:?CLICKHOUSE_HOST must be set}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:?CLICKHOUSE_PORT must be set}
      - CLICKHOUSE_HTTP_PORT=${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT must be set}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:?CLICKHOUSE_DATABASE must be set}
    volumes:
      - .:/opt/app
      - dagster-instance:/opt/dagster-instance
    depends_on:
      clickhouse:
        condition: service_healthy
    command: dagster-webserver -h 0.0.0.0 -p 3000
    restart: unless-stopped

  dagster:
    build: .
    image: origo-control-plane-dagster:latest
    environment:
      - DAGSTER_HOME=/opt/app
      - PYTHONPATH=/opt/app
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:?CLICKHOUSE_HOST must be set}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:?CLICKHOUSE_PORT must be set}
      - CLICKHOUSE_HTTP_PORT=${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT must be set}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:?CLICKHOUSE_DATABASE must be set}
    volumes:
      - .:/opt/app
      - dagster-instance:/opt/dagster-instance
    depends_on:
      clickhouse:
        condition: service_healthy
    command: dagster-daemon run
    restart: unless-stopped

volumes:
  clickhouse-data:
  dagster-instance:
