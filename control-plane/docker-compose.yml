services:
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./clickhouse-config.xml:/etc/clickhouse-server/config.d/clickhouse-config.xml
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  object-store:
    image: quay.io/minio/minio
    command:
      - server
      - /data
      - --console-address
      - :9001
    environment:
      MINIO_ROOT_USER: ${ORIGO_OBJECT_STORE_ACCESS_KEY_ID:?ORIGO_OBJECT_STORE_ACCESS_KEY_ID must be set}
      MINIO_ROOT_PASSWORD: ${ORIGO_OBJECT_STORE_SECRET_ACCESS_KEY:?ORIGO_OBJECT_STORE_SECRET_ACCESS_KEY must be set}
      MINIO_REGION: ${ORIGO_OBJECT_STORE_REGION:?ORIGO_OBJECT_STORE_REGION must be set}
    ports:
      - '${ORIGO_DOCKER_OBJECT_STORE_PORT:?ORIGO_DOCKER_OBJECT_STORE_PORT must be set}:9000'
      - '${ORIGO_DOCKER_OBJECT_STORE_CONSOLE_PORT:?ORIGO_DOCKER_OBJECT_STORE_CONSOLE_PORT must be set}:9001'
    volumes:
      - object-store-data:/data
    restart: unless-stopped

  object-store-init:
    image: quay.io/minio/mc
    env_file:
      - ../.env
    depends_on:
      object-store:
        condition: service_started
    entrypoint:
      - /bin/sh
      - -ec
      - |
        until mc alias set local http://object-store:9000 "${ORIGO_OBJECT_STORE_ACCESS_KEY_ID}" "${ORIGO_OBJECT_STORE_SECRET_ACCESS_KEY}"; do
          sleep 1
        done
        mc mb --ignore-existing "local/${ORIGO_OBJECT_STORE_BUCKET}"
    restart: "no"

  dagit:
    build: .
    image: origo-control-plane-dagster:latest
    ports:
      - "4000:3000"
    environment:
      - DAGSTER_HOME=/opt/app
      - PYTHONPATH=/opt/app
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:?CLICKHOUSE_HOST must be set}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:?CLICKHOUSE_PORT must be set}
      - CLICKHOUSE_HTTP_PORT=${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT must be set}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:?CLICKHOUSE_DATABASE must be set}
    volumes:
      - .:/opt/app
      - dagster-instance:/opt/dagster-instance
    depends_on:
      clickhouse:
        condition: service_healthy
      object-store-init:
        condition: service_completed_successfully
    command: dagster-webserver -h 0.0.0.0 -p 3000
    restart: unless-stopped

  dagster:
    build: .
    image: origo-control-plane-dagster:latest
    environment:
      - DAGSTER_HOME=/opt/app
      - PYTHONPATH=/opt/app
      - CLICKHOUSE_HOST=${CLICKHOUSE_HOST:?CLICKHOUSE_HOST must be set}
      - CLICKHOUSE_PORT=${CLICKHOUSE_PORT:?CLICKHOUSE_PORT must be set}
      - CLICKHOUSE_HTTP_PORT=${CLICKHOUSE_HTTP_PORT:?CLICKHOUSE_HTTP_PORT must be set}
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:?CLICKHOUSE_USER must be set}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:?CLICKHOUSE_PASSWORD must be set}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:?CLICKHOUSE_DATABASE must be set}
    volumes:
      - .:/opt/app
      - dagster-instance:/opt/dagster-instance
    depends_on:
      clickhouse:
        condition: service_healthy
      object-store-init:
        condition: service_completed_successfully
    command: dagster-daemon run
    restart: unless-stopped

volumes:
  clickhouse-data:
  dagster-instance:
  object-store-data:
